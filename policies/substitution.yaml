pack_id: substitution
version: "1.0.0"
title: Substitution tolerance
description: >
  When a retailer proposes a substitute SKU, the price variance against the
  original offer must be within the consumer's tolerance. Beyond tolerance,
  the substitute is not blocked outright - it is escalated for explicit
  consumer approval.
applies_to_actions:
  - accept_substitute
rules:
  - rule_id: substitution.within_tolerance
    kind: substitute_within_price_tolerance
    description: Substitute price variance must be within the consumer tolerance.
    on_violation: escalate
    params: {}
